  '@ast-grep/napi': ^0.39.9
  '@ctrl/tinycolor': ^4.1.0
  'clsx': ^2.1.1
  'esbuild': ^0.25.3
  'jiti': ^2.6.1
  'unbuild': ^3.3.1

  # Vue ecosystem
  'vue': ^3.4.3
  'vue-router': ^4.2.5
  'vue-tsc': ^3.2.2

  # Nuxt ecosystem
  'nuxt': ^4.0.0
  '@nuxt/image': ^2.0.0
  '@nuxt/ui': ^4.0.0
  '@nuxtjs/i18n': ^9.0.0

  # Tailwind CSS
  'tailwindcss': ^4.0.0
  '@tailwindcss/postcss': ^4.0.0
  '@tailwindcss/typography': ^0.5.15
  'postcss': ^8.4.32

  # Iconify
  '@iconify-json/bx': ^1.2.2
  '@iconify-json/heroicons': ^1.2.3
